<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini CLI Dashboard</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" href="./assets/images/icon_2.png" />
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/chat.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/diff/dist/diff.min.js"></script>
  <script>
    /* Safari 用：見えている高さを --vh に反映 */
    function setRealVH() {
      const vh = window.innerHeight * 0.01;
      document.documentElement.style.setProperty('--vh', `${vh}px`);
    }
    setRealVH();
    window.addEventListener('resize', setRealVH);
  </script>
</head>
<body>
  <div id="appContainer">
    <!-- 左側カラム -->
    <div id="leftColumn">
      <div id="date-nav" class="date-nav">
          <button id="prev-day">◀</button>
          <div id="current-date-display">
              <span id="date-text"></span>
              <input type="date" id="date-picker">
          </div>
          <button id="next-day">▶</button>
      </div>
      <div id="mainContent">
        <div class="main-content-wrapper">
            <div id="daily-goal-container"></div>
            <div id="daily-summary-container"></div>
            <div id="logs-container"></div>
        </div>
      </div>
    </div>

    <!-- 境界ドラッグバー -->
    <div id="resizer"></div>

    <div id="chatPanel">
      <div id="chatHeader">
        <span>Gemini Chat</span>
        <div class="chat-header-buttons">
          <button id="fullscreenToggle" class="chat-btn" title="全画面">⛶</button>
          <button id="chatClose"        class="chat-btn" title="閉じる">✕</button>
        </div>
      </div>
      <div id="chatMessages"></div>
      <div id="chatInputArea">
        <textarea id="chatInput" placeholder="メッセージ…"></textarea>
        <button id="chatSend" aria-label="送信">
          <!-- 真上向きの矢印（黒線・塗り無し）-->
          <svg viewBox="0 0 24 24" width="32" height="32"
               stroke="black" stroke-width="3" stroke-linecap="round"
               fill="none">
            <path d="M12 5v14M5 12l7-7 7 7"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <button id="chatOpenBtn"      class="chat-btn" aria-label="Open"></button>
  <script src="./js/init.js" defer></script>
  <script src="./js/script.js" defer></script>
  <script src="./js/chat.js" defer></script>
</body>
</html>
